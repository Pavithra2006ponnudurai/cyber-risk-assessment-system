<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — AuditPro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>AuditPro</h1>
        <p>Audit Management System</p>
      </div>

      <p class="auth-title">Create your account</p>

      <div id="reg-alert"></div>

      <form id="register-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" required minlength="3">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="reg-role">
            <option value="CLIENT">Client</option>
            <option value="AUDITOR">Auditor</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="reg-btn" data-label="Create Account">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/pages/dashboard.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      UI.clearAlert('reg-alert');
      UI.setLoading('reg-btn', true);

      try {
        await API.post('/auth/register', {
          username: document.getElementById('reg-username').value.trim(),
          email: document.getElementById('reg-email').value.trim(),
          password: document.getElementById('reg-password').value,
          role: document.getElementById('reg-role').value
        });
        UI.alert('reg-alert', 'Account created! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/', 1500);
      } catch (err) {
        UI.alert('reg-alert', err.message);
        UI.setLoading('reg-btn', false);
        document.getElementById('reg-btn').innerHTML = 'Create Account';
      }
    });
  </script>
</body>
</html>
