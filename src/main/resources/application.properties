spring.application.name=audit-management

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:auditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
app.jwt.secret=AuditManagementSystemSecretKey2024VeryLongSecretForHS256Algorithm
app.jwt.expiration=86400000

# Disable auto SQL script execution (schema managed by JPA ddl-auto)
spring.sql.init.mode=never

# Server
server.port=8080
